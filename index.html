<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div id="root"></div>
  </body>
  <script src="https://unpkg.com/react@17.0.2/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@17.0.2/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel">
    //babel은 head에 담아준다.
    const root = document.getElementById("root");
    function App() {
      const [minutes, setMinutes] = React.useState();
      const onChange = (event) => setMinutes(event.target.value);
      return (
        <div>
          <h1>Super Converter</h1> {/*jsx에 javascript식 변수 넣는 방법*/}
          <label htmlFor="minutes">Minutes</label>
          {/*input 옆에 써주는 것. HTML에서 쓰는 방법 글씨를 누르면 옆에 id를 for로 맞춘 input이 눌러진다. 그래서 htmlFor 라고 써줘야함.*/}
          <input
            value={minutes}
            id="minutes"
            placeholder="Minutes"
            type="number"
            onChange={onChange}
          />
          <h4>You want to convert {minutes}</h4>
          <label htmlFor="hours">Hours</label>
          <input id="hours" placeholder="Hours" type="number" />
        </div>
      ); //컴포넌트의 첫글자는 반드시 대문자여야 한다. 소문자는 HTML tag.
    } //컴포넌트를 다른 컴포넌트에 넣는 방법
    //연습중입니다.
    ReactDOM.render(<App />, root); //여기서 렌더링을 한번 해주고 나서 버튼을 클릭했을 때 렌더링을 더이상 안해주기 때문에 container 안에 있는 counter가 올라가지 않는다. 그렇기 때문에 randering을 새로 해주는 함수 만들어서 넣음.
  </script>
</html>
